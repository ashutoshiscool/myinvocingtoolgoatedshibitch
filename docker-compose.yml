version: '3.8'

services:
  backend:
    build: ./backend
    container_name: lumor_pay_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_PATH=/app/database.sqlite
      - JWT_SECRET=${JWT_SECRET:-lumor_pay_super_secret_jwt_key_12345}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - PAYPAL_MODE=${PAYPAL_MODE:-sandbox}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-2525}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - sqlite-data:/app
    restart: always

  frontend:
    build: ./frontend
    container_name: lumor_pay_frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always

volumes:
  sqlite-data:
